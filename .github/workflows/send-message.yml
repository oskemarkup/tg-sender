name: Send Telegram Message

on:
  schedule:
    - cron: "0 8 * * *" # 11:00 MSK (UTC+3)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch messages
        run: |
          DELIM=$(openssl rand -hex 16)
          {
            echo "TG_MESSAGE<<$DELIM"
            curl -s "${{ vars.TG_MESSAGES_GIST_URL }}" | tr -d '\r'
            printf '\n'
            echo "$DELIM"
          } >> $GITHUB_ENV

      - run: npm run send
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_RECIPIENT_ID: ${{ vars.TG_RECIPIENT_ID }}
