name: Send Telegram Message

on:
  schedule:
    - cron: "0 8 * * *" # 11:00 MSK (UTC+3)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch messages
        run: |
          {
            echo 'TG_MESSAGE<<EOF'
            curl -s "${{ vars.TG_MESSAGES_GIST_URL }}"
            echo EOF
          } >> $GITHUB_ENV

      - run: npm run send
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_RECIPIENT_ID: ${{ vars.TG_RECIPIENT_ID }}
